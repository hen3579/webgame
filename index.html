<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>新·给猫猫刷毛毛</title>
    <meta name="description" content="长按按钮偷偷给猫猫刷毛，千万别被发现！">
    <meta property="og:title" content="给猫猫刷毛毛">
    <meta property="og:description" content="长按按钮偷偷给猫猫刷毛，千万别被发现！">
    <meta property="og:image" content="https://webgame-egr.top/image/openning_graph.png">
    <meta property="og:image:width" content="1024">
    <meta property="og:image:height" content="1024">
    <meta property="og:url" content="https://webgame-egr.top/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="新·给猫猫刷毛毛">
    <meta name="twitter:description" content="长按按钮偷偷给猫猫刷毛，千万别被发现！">
    <meta name="twitter:image" content="https://webgame-egr.top/image/openning_graph.png">
    <link rel="icon" type="image/x-icon" href="image/favicon.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #2a1f1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            touch-action: manipulation;
            overflow: hidden;
        }
        #game-container {
            text-align: center;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ========== 页面切换 ========== */
        .page { display: none; flex-direction: column; align-items: center; }
        .page.active { display: flex; }

        /* ========== 加载页 ========== */
        #loading-page {
            color: #d7ccc8;
            font-size: 18px;
            gap: 16px;
        }
        .loading-dots::after {
            content: '';
            animation: dots 1.2s steps(4, end) infinite;
        }
        @keyframes dots {
            0%   { content: ''; }
            25%  { content: '.'; }
            50%  { content: '..'; }
            75%  { content: '...'; }
            100% { content: ''; }
        }
        .loading-bar-wrap {
            width: 200px;
            height: 6px;
            background: #4e342e;
            border-radius: 3px;
            overflow: hidden;
        }
        .loading-bar {
            height: 100%;
            width: 0%;
            background: #ffb74d;
            border-radius: 3px;
            transition: width 0.2s;
        }

        /* ========== 启动页 ========== */
        #start-page {
            gap: 20px;
        }
        #start-page .game-title {
            font-size: 32px;
            font-weight: bold;
            color: #ffb74d;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
            letter-spacing: 3px;
        }
        #start-page .game-subtitle {
            font-size: 14px;
            color: #a1887f;
            margin-top: -10px;
        }

        /* ========== 分数区 ========== */
        #score-area {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 10px;
            z-index: 10;
        }
        .score-box {
            text-align: center;
        }
        .score-label {
            font-size: 12px;
            color: #bcaaa4;
            margin-bottom: 2px;
            letter-spacing: 1px;
        }
        #score, #high-score {
            font-size: 24px;
            font-weight: bold;
            color: #f7ebd3;
        }
        #high-score {
            color: #a1887f;
        }
        #combo-box {
            min-width: 60px;
        }
        #combo-val {
            font-size: 20px;
            font-weight: bold;
            color: #ff8a65;
            text-shadow: 0 0 8px rgba(255,138,101,0.4);
            transition: transform 0.15s;
        }
        #combo-val.pop {
            transform: scale(1.4);
        }

        /* ========== 浮动提示文字 ========== */
        #float-text {
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 28px;
            font-weight: bold;
            color: #ffd54f;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8), 0 0 20px rgba(255,213,79,0.6);
            pointer-events: none;
            opacity: 0;
            z-index: 50;
            white-space: nowrap;
        }
        @keyframes floatUp {
            0%   { opacity: 0; transform: translate(-50%, -30%) scale(0.5); }
            20%  { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
            40%  { opacity: 1; transform: translate(-50%, -55%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -90%) scale(0.9); }
        }
        #float-text.show {
            animation: floatUp 1.2s ease-out forwards;
        }

        /* ========== Monitor 画布 ========== */
        #monitor, .monitor-preview {
            position: relative;
            width: min(64vw, 315px);
            aspect-ratio: 1/1;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
            border-radius: 8px;
            overflow: hidden;
        }
        .layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
            -webkit-user-drag: none;
            user-drag: none;
        }

        /* 层级顺序（从底到顶） */
        #bg            { z-index: 0; }
        #actor-body    { z-index: 1; }
        #eyes          { z-index: 2; }
        #actor-handfree{ z-index: 3; }
        #table         { z-index: 5; }
        #cat-body      { z-index: 6; }
        #bubble        { z-index: 7; }
        #mood          { z-index: 8; }
        #cat-head      { z-index: 9; }
        #arm           { z-index: 10; }
        #bitten        { z-index: 100; }

        @keyframes bonusGlow {
            0%, 100% { filter: brightness(1) drop-shadow(0 0 0px rgba(129, 199, 132, 0)); }
            50%      { filter: brightness(1.15) drop-shadow(0 0 20px rgba(129, 199, 132, 0.6)); }
        }
        #monitor.bonus {
            animation: bonusGlow 0.8s ease-in-out infinite;
        }
        #bitten {
            display: none;
            opacity: 0;
            transition: opacity 0.12s ease-out;
        }
        #bitten.show {
            display: block;
            opacity: 1;
        }

        @keyframes armSway {
            0%   { transform: translateX(0) translateY(0); }
            25%  { transform: translateX(-4px) translateY(-4px); }
            50%  { transform: translateX(2px) translateY(-2px); }
            75%  { transform: translateX(12px) translateY(-10px); }
            100% { transform: translateX(0) translateY(0); }
        }
        @keyframes eyesSway {
            0%   { transform: translateX(0) translateY(0); }
            25%  { transform: translateX(-1px) translateY(-0.5px); }
            50%  { transform: translateX(0) translateY(0); }
            75%  { transform: translateX(1px) translateY(-0.5px); }
            100% { transform: translateX(0) translateY(0); }
        }
        .arm-anim  { animation: armSway 1.0s ease-in-out infinite; }
        .eyes-anim { animation: eyesSway 1.0s ease-in-out infinite; animation-delay: 0.1s; }

        /* ========== 控制按钮 ========== */
        #ctrl-btn {
            width: min(42vw, 210px);
            margin-top: 8px;
            cursor: pointer;
            -webkit-user-drag: none;
            user-drag: none;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
            z-index: 10;
            transition: transform 0.08s;
        }
        #ctrl-btn:active { transform: scale(0.95); }

        /* 启动页按钮用 CtrlButton on.png 当开始按钮 */
        .big-btn {
            margin-top: 10px;
            padding: 12px 32px;
            font-size: 18px;
            font-weight: bold;
            background-color: #ffb74d;
            color: #3e2723;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 4px 0 #e6953b, 0 6px 12px rgba(0,0,0,0.3);
            transition: all 0.08s;
            letter-spacing: 2px;
        }
        .big-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #e6953b, 0 3px 6px rgba(0,0,0,0.3);
        }
        .btn-row {
            display: flex;
            gap: 12px;
            margin-top: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn-secondary {
            background-color: #8d6e63;
            color: white;
            box-shadow: 0 4px 0 #5d4037, 0 6px 12px rgba(0,0,0,0.3);
            font-size: 15px;
            padding: 10px 22px;
            font-weight: normal;
            letter-spacing: 1px;
        }
        .btn-secondary:active {
            box-shadow: 0 2px 0 #5d4037, 0 3px 6px rgba(0,0,0,0.3);
        }

        #status-text {
            margin-top: 8px;
            font-size: 16px;
            color: #d7ccc8;
            height: 24px;
            z-index: 10;
        }

        /* 启动页说明 */
        .instruction {
            margin-top: 10px;
            font-size: 13px;
            color: #8d6e63;
            line-height: 1.8;
            max-width: 320px;
        }
        .instruction .icon { color: #ffb74d; font-weight: bold; }

        /* ========== 排行榜 ========== */
        .leaderboard {
            width: min(85vw, 320px);
            background: rgba(62, 39, 24, 0.7);
            border-radius: 12px;
            padding: 12px 14px;
            margin-top: 10px;
            border: 2px solid #8d6e63;
        }
        .leaderboard-title {
            text-align: center;
            font-size: 15px;
            color: #ffb74d;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }
        .leaderboard-list {
            font-size: 13px;
            color: #d7ccc8;
        }
        .lb-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 3px 0;
            border-bottom: 1px dashed rgba(141, 110, 99, 0.3);
        }
        .lb-row:last-child { border-bottom: none; }
        .lb-rank {
            width: 28px;
            font-weight: bold;
            color: #ffb74d;
            text-align: center;
        }
        .lb-rank.gold   { color: #ffd54f; text-shadow: 0 0 6px rgba(255,213,79,0.5); }
        .lb-rank.silver { color: #e0e0e0; }
        .lb-rank.bronze { color: #ffab91; }
        .lb-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            padding: 0 8px;
            text-align: left;
        }
        .lb-score {
            color: #fff3e0;
            font-weight: bold;
            min-width: 50px;
            text-align: right;
        }
        .lb-empty {
            text-align: center;
            color: #8d6e63;
            padding: 10px 0;
            font-size: 12px;
        }
        .lb-my-rank {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #8d6e63;
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #ffcc80;
        }
        .lb-loading {
            text-align: center;
            color: #8d6e63;
            padding: 10px 0;
            font-size: 12px;
        }

        /* ========== 提交分数弹窗 ========== */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal-box {
            background: #4e342e;
            border: 3px solid #8d6e63;
            border-radius: 16px;
            padding: 24px 28px;
            width: min(85vw, 320px);
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        .modal-title {
            font-size: 20px;
            color: #ffb74d;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .modal-score {
            font-size: 36px;
            color: #fff3e0;
            font-weight: bold;
            margin: 10px 0;
            text-shadow: 0 0 12px rgba(255,183,77,0.4);
        }
        .modal-hint {
            font-size: 12px;
            color: #a1887f;
            margin-bottom: 14px;
        }
        .modal-input {
            width: 100%;
            padding: 10px 14px;
            font-size: 16px;
            border: 2px solid #8d6e63;
            border-radius: 8px;
            background: #3e2723;
            color: #f7ebd3;
            text-align: center;
            outline: none;
            margin-bottom: 14px;
            font-family: inherit;
        }
        .modal-input:focus {
            border-color: #ffb74d;
        }
        .modal-input::placeholder { color: #6d4c41; }
        .modal-btns {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .modal-btns .big-btn {
            font-size: 14px;
            padding: 9px 18px;
        }
        .modal-result {
            font-size: 14px;
            color: #81c784;
            margin-bottom: 12px;
            min-height: 20px;
        }
        .modal-result.error { color: #ef5350; }
    </style>
</head>
<body>

<div id="game-container">

    <!-- 加载页 -->
    <div id="loading-page" class="page active">
        <div>加载中<span class="loading-dots"></span></div>
        <div class="loading-bar-wrap">
            <div class="loading-bar" id="loading-bar"></div>
        </div>
    </div>

    <!-- 启动页 -->
    <div id="start-page" class="page">
        <div class="game-title">🐱 新·给猫猫刷毛毛</div>
        <div class="game-subtitle">—— 长按按钮给猫刷毛，别被猫猫发现了！——</div>
        <div id="monitor-start" class="monitor-preview">
            <img class="layer" src="image/Monitor/background.png" alt="">
            <img class="layer" src="image/Monitor/Actor/handfree.png" alt="">
            <img class="layer" src="image/Monitor/table.png" alt="">
            <img class="layer" src="image/Monitor/Cat/Body.png" alt="">
            <img class="layer" src="image/Monitor/MoodBubble/bubble.png" alt="">
            <img class="layer" src="image/Monitor/MoodBubble/mood/safe/safe0.png" alt="">
            <img class="layer" src="image/Monitor/Cat/head/Safe.png" alt="">
        </div>
        <div class="btn-row" style="margin-top:0;">
            <button class="big-btn" id="start-btn" style="flex:3;margin-top:0;">开始游戏</button>
            <button class="big-btn btn-secondary" id="rank-btn" style="flex:1;font-size:13px;padding:12px 6px;margin-top:0;">🏆</button>
        </div>
        <div class="instruction">
            <span class="icon">🐱</span> Made by 木鸡先生Hen  Character from 怒九笑<br>
            Idea by artbyeori<br>
            <span class="icon">😼</span> 打开一半音量，体验更佳
        </div>
        <div id="start-high-score" style="font-size:13px;color:#a1887f;margin-top:6px;"></div>
    </div>

    <!-- 游戏页 -->
    <div id="game-page" class="page">
        <div id="score-area">
            <div class="score-box">
                <div class="score-label">得分</div>
                <div id="score"><span id="score-val">0</span></div>
            </div>
            <div class="score-box" id="combo-box">
                <div class="score-label">连击</div>
                <div id="combo-val">-</div>
            </div>
            <div class="score-box">
                <div class="score-label">最高分</div>
                <div id="high-score"><span id="high-score-val">0</span></div>
            </div>
        </div>

        <div id="monitor">
            <img class="layer" id="bg" src="image/Monitor/background.png" alt="">
            <img class="layer" id="actor-body" src="image/Monitor/Actor/working/body.png" alt="">
            <img class="layer" id="eyes" src="image/Monitor/Actor/working/eyes.png" alt="">
            <img class="layer" id="actor-handfree" src="image/Monitor/Actor/handfree.png" alt="">
            <img class="layer" id="table" src="image/Monitor/table.png" alt="">
            <img class="layer" id="cat-body" src="image/Monitor/Cat/Body.png" alt="">
            <img class="layer" id="bubble" src="image/Monitor/MoodBubble/bubble.png" alt="">
            <img class="layer" id="mood" src="image/Monitor/MoodBubble/mood/safe/safe0.png" alt="">
            <img class="layer" id="cat-head" src="image/Monitor/Cat/head/Safe.png" alt="">
            <img class="layer" id="arm" src="image/Monitor/Actor/working/arm.png" alt="">
            <img class="layer" id="bitten" src="image/Bitten.png" alt="">
            <div id="float-text"></div>
        </div>

        <img id="ctrl-btn" src="image/CtrlButton/off.png" alt="按住刷毛">
        <div id="status-text">长按按钮给猫刷毛！</div>
        <div class="btn-row" id="gameover-btns" style="display:none;">
            <button class="big-btn btn-secondary" id="restart-btn">重新挑战</button>
            <button class="big-btn btn-secondary" id="home-btn">返回首页</button>
        </div>
    </div>

    <!-- 提交分数弹窗 -->
    <div class="modal-overlay" id="submit-modal">
        <div class="modal-box">
            <div class="modal-title">游戏结束</div>
            <div class="modal-score" id="modal-score-val">0</div>
            <div class="modal-hint">输入昵称上榜（最多12字）</div>
            <input type="text" class="modal-input" id="modal-name-input" placeholder="你的昵称" maxlength="12">
            <div class="modal-result" id="modal-result"></div>
            <div class="modal-btns">
                <button class="big-btn" id="modal-submit-btn">提交分数</button>
                <button class="big-btn btn-secondary" id="modal-skip-btn">跳过</button>
            </div>
        </div>
    </div>

    <!-- 排行榜弹窗 -->
    <div class="modal-overlay" id="rank-modal">
        <div class="modal-box" style="width:min(90vw,360px);padding:20px 22px;">
            <div class="modal-title">🏆 排行榜 TOP 10</div>
            <div id="rank-modal-content" style="max-height:50vh;overflow-y:auto;margin:12px 0 4px;">
                <div class="lb-loading">加载中...</div>
            </div>
            <div class="modal-btns" style="margin-top:14px;">
                <button class="big-btn btn-secondary" id="rank-close-btn">关闭</button>
            </div>
        </div>
    </div>

</div>

<script>
    const IMG = {
        catHead: {
            SAFE: 'image/Monitor/Cat/head/Safe.png',
            DANGER: 'image/Monitor/Cat/head/Danger.png',
            BONUS: 'image/Monitor/Cat/head/Bonus.png'
        },
        mood: {
            safe: [
                'image/Monitor/MoodBubble/mood/safe/safe0.png',
                'image/Monitor/MoodBubble/mood/safe/safe1.png',
                'image/Monitor/MoodBubble/mood/safe/safe2.png',
                'image/Monitor/MoodBubble/mood/safe/safe3.png'
            ],
            warning: 'image/Monitor/MoodBubble/mood/warning.png',
            bonus: 'image/Monitor/MoodBubble/mood/bonus.png'
        },
        btn: {
            off: 'image/CtrlButton/off.png',
            on:  'image/CtrlButton/on.png'
        }
    };

    const ALL_IMG_SOURCES = [
        'image/Monitor/background.png',
        'image/Monitor/Cat/Body.png',
        'image/Monitor/Cat/head/Safe.png',
        'image/Monitor/Cat/head/Danger.png',
        'image/Monitor/Cat/head/Bonus.png',
        'image/Monitor/MoodBubble/bubble.png',
        ...IMG.mood.safe,
        IMG.mood.warning,
        IMG.mood.bonus,
        'image/Monitor/Actor/handfree.png',
        'image/Monitor/Actor/working/body.png',
        'image/Monitor/Actor/working/arm.png',
        'image/Monitor/Actor/working/eyes.png',
        'image/Monitor/table.png',
        'image/Bitten.png',
        IMG.btn.off,
        IMG.btn.on
    ];

    const bgmSafe = new Audio('bgm/safe.ogg');
    const bgmDanger = new Audio('bgm/danger.ogg');
    const bgmBitten = new Audio('bgm/bitten.ogg');
    const bgmBonus = new Audio('bgm/bonus.ogg');
    const bgmStart = new Audio('bgm/start.ogg');
    bgmSafe.preload = bgmDanger.preload = bgmBitten.preload = bgmBonus.preload = bgmStart.preload = 'auto';
    bgmSafe.volume = bgmDanger.volume = bgmBitten.volume = bgmBonus.volume = bgmStart.volume = 0.6;
    bgmSafe.loop = true;
    bgmDanger.loop = true;
    bgmBitten.loop = false;
    bgmBonus.loop = true;
    bgmStart.loop = true;

    let currentBgm = null;

    function playBgm(audio) {
        if (currentBgm && currentBgm !== audio) {
            currentBgm.pause();
            if (currentBgm === bgmBitten) currentBgm.currentTime = 0;
        }
        if (audio && audio !== currentBgm) {
            if (audio === bgmBitten) audio.currentTime = 0;
            audio.play().catch(() => {});
        }
        currentBgm = audio;
    }

    function pauseAllBgm() {
        [bgmSafe, bgmDanger, bgmBitten, bgmBonus, bgmStart].forEach(a => a.pause());
        currentBgm = null;
    }

    function stopAllBgm() {
        [bgmSafe, bgmDanger, bgmBitten, bgmBonus, bgmStart].forEach(a => {
            a.pause();
            a.currentTime = 0;
        });
        currentBgm = null;
    }

    let score = 0;
    let highScore = 0;
    let isGameOver = false;
    let isBrushing = false;
    let catState = 'SAFE';
    let combo = 0;
    let warningDeadline = 0;
    let warningTotalDuration = 0;
    let brushedInThisWarning = false;
    let comboAwardedThisWarning = false;
    let warningCheckInterval = null;
    let floatTextTimeout = null;
    let comboPopTimeout = null;

    const COMBO_MAX = 10;
    const COMBO_STEP = 0.15;
    const PERFECT_WINDOW_MS = 250;
    const PERFECT_BONUS = 20;
    const RISK_PER_TICK = 45;

    const monitorEl      = document.getElementById('monitor');
    const catHeadEl      = document.getElementById('cat-head');
    const catBodyEl      = document.getElementById('cat-body');
    const moodEl         = document.getElementById('mood');
    const bubbleEl       = document.getElementById('bubble');
    const actorBodyEl    = document.getElementById('actor-body');
    const actorHandfreeEl= document.getElementById('actor-handfree');
    const armEl          = document.getElementById('arm');
    const eyesEl         = document.getElementById('eyes');
    const bittenEl       = document.getElementById('bitten');
    const tableEl        = document.getElementById('table');
    const ctrlBtnEl      = document.getElementById('ctrl-btn');
    const scoreValEl     = document.getElementById('score-val');
    const highScoreValEl = document.getElementById('high-score-val');
    const comboValEl     = document.getElementById('combo-val');
    const statusTextEl   = document.getElementById('status-text');
    const floatTextEl    = document.getElementById('float-text');
    const restartBtn     = document.getElementById('restart-btn');
    const homeBtn        = document.getElementById('home-btn');
    const gameoverBtns   = document.getElementById('gameover-btns');
    const startBtn       = document.getElementById('start-btn');
    const startHighScore = document.getElementById('start-high-score');
    const loadingBarEl   = document.getElementById('loading-bar');
    const rankBtn        = document.getElementById('rank-btn');
    const rankModalEl    = document.getElementById('rank-modal');
    const rankModalContent = document.getElementById('rank-modal-content');
    const rankCloseBtn   = document.getElementById('rank-close-btn');
    const submitModalEl  = document.getElementById('submit-modal');
    const modalScoreEl   = document.getElementById('modal-score-val');
    const modalNameInput = document.getElementById('modal-name-input');
    const modalResultEl  = document.getElementById('modal-result');
    const modalSubmitBtn = document.getElementById('modal-submit-btn');
    const modalSkipBtn   = document.getElementById('modal-skip-btn');

    const loadingPage = document.getElementById('loading-page');
    const startPage   = document.getElementById('start-page');
    const gamePage    = document.getElementById('game-page');

    const API_BASE = '';
    let scoreSubmitted = false;

    let stateLogicTimeout = null;
    let warningTimeout    = null;
    let dangerEndTimeout  = null;
    let bonusEndTimeout   = null;
    let scoreInterval     = null;
    let safeMoodInterval  = null;
    let safeMoodIdx       = 0;

    let audioUnlocked = false;

    function unlockAudio() {
        if (audioUnlocked) return;
        audioUnlocked = true;
        [bgmSafe, bgmDanger, bgmBitten, bgmBonus, bgmStart].forEach(a => {
            a.play().then(() => { a.pause(); a.currentTime = 0; }).catch(() => {});
        });
        if (startPage.classList.contains('active')) {
            bgmStart.currentTime = 0;
            bgmStart.play().catch(() => {});
            currentBgm = bgmStart;
        }
        document.removeEventListener('click', unlockAudio);
        document.removeEventListener('touchstart', unlockAudio);
    }

    function showPage(page) {
        [loadingPage, startPage, gamePage].forEach(p => p.classList.remove('active'));
        page.classList.add('active');

        if (page === startPage) {
            stopAllBgm();
            if (audioUnlocked) {
                bgmStart.currentTime = 0;
                bgmStart.play().catch(() => {});
                currentBgm = bgmStart;
            }
        } else {
            bgmStart.pause();
            bgmStart.currentTime = 0;
        }
    }

    function loadHighScore() {
        try {
            const saved = localStorage.getItem('catBrushHighScore');
            if (saved !== null) {
                highScore = parseInt(saved, 10) || 0;
                highScoreValEl.textContent = highScore;
                if (highScore > 0) {
                    startHighScore.textContent = '最高分：' + highScore;
                }
            }
        } catch(e) {}
    }

    function saveHighScore() {
        try {
            localStorage.setItem('catBrushHighScore', String(highScore));
        } catch(e) {}
    }

    function preloadAllImages(cb) {
        let loaded = 0;
        const total = ALL_IMG_SOURCES.length;
        ALL_IMG_SOURCES.forEach(src => {
            const img = new Image();
            img.onload = img.onerror = () => {
                loaded++;
                loadingBarEl.style.width = (loaded / total * 100) + '%';
                if (loaded >= total) cb();
            };
            img.src = src;
        });
    }

    function startSafeMoodAnim() {
        stopSafeMoodAnim();
        safeMoodIdx = 0;
        moodEl.src = IMG.mood.safe[0];
        safeMoodInterval = setInterval(() => {
            safeMoodIdx = (safeMoodIdx + 1) % 4;
            moodEl.src = IMG.mood.safe[safeMoodIdx];
        }, 400);
    }

    function stopSafeMoodAnim() {
        if (safeMoodInterval) {
            clearInterval(safeMoodInterval);
            safeMoodInterval = null;
        }
    }

    function getBaseScore() {
        return 1 + Math.min(combo, COMBO_MAX) * COMBO_STEP;
    }

    function addScore(points) {
        score += points;
        scoreValEl.textContent = Math.floor(score);
    }

    function updateComboDisplay(pop) {
        if (combo <= 0) {
            comboValEl.textContent = '-';
            comboValEl.style.color = '#a1887f';
        } else {
            const mult = 1 + Math.min(combo, COMBO_MAX) * COMBO_STEP;
            comboValEl.textContent = 'x' + mult.toFixed(2);
            comboValEl.style.color = combo >= 5 ? '#ff7043' : '#ff8a65';
        }
        if (pop) {
            comboValEl.classList.remove('pop');
            void comboValEl.offsetWidth;
            comboValEl.classList.add('pop');
            clearTimeout(comboPopTimeout);
            comboPopTimeout = setTimeout(() => comboValEl.classList.remove('pop'), 200);
        }
    }

    function showFloatText(text, color) {
        floatTextEl.textContent = text;
        floatTextEl.style.color = color || '#ffd54f';
        floatTextEl.classList.remove('show');
        void floatTextEl.offsetWidth;
        floatTextEl.classList.add('show');
        clearTimeout(floatTextTimeout);
        floatTextTimeout = setTimeout(() => floatTextEl.classList.remove('show'), 1200);
    }

    function setActorMode(brushing) {
        if (brushing) {
            actorHandfreeEl.style.display = 'none';
            actorBodyEl.style.display = 'block';
            eyesEl.style.display = 'block';
            armEl.style.display = 'block';
            armEl.classList.add('arm-anim');
            eyesEl.classList.add('eyes-anim');
            ctrlBtnEl.src = IMG.btn.on;
        } else {
            actorHandfreeEl.style.display = 'block';
            actorBodyEl.style.display = 'none';
            eyesEl.style.display = 'none';
            armEl.style.display = 'none';
            armEl.classList.remove('arm-anim');
            eyesEl.classList.remove('eyes-anim');
            ctrlBtnEl.src = IMG.btn.off;
        }
    }

    function render() {
        monitorEl.classList.remove('bonus');
        bittenEl.classList.remove('show');
        bubbleEl.style.display = 'block';
        moodEl.style.display = 'block';

        switch (catState) {
            case 'SAFE':
                catHeadEl.src = IMG.catHead.SAFE;
                bubbleEl.style.display = 'block';
                moodEl.style.display = 'block';
                statusTextEl.textContent = combo > 0 ? `安全，继续刷毛... 连击x${(1+Math.min(combo,COMBO_MAX)*COMBO_STEP).toFixed(2)}` : '安全，继续刷毛...';
                startSafeMoodAnim();
                break;
            case 'WARNING':
                catHeadEl.src = IMG.catHead.SAFE;
                moodEl.src = IMG.mood.warning;
                moodEl.style.display = 'block';
                statusTextEl.textContent = '！！猫猫要回头了！贪刷有风险...';
                stopSafeMoodAnim();
                break;
            case 'DANGER':
                catHeadEl.src = IMG.catHead.DANGER;
                bubbleEl.style.display = 'none';
                moodEl.style.display = 'none';
                statusTextEl.textContent = '别动！！！猫猫生气了！';
                stopSafeMoodAnim();
                break;
            case 'BONUS':
                catHeadEl.src = IMG.catHead.BONUS;
                moodEl.src = IMG.mood.bonus;
                moodEl.style.display = 'block';
                monitorEl.classList.add('bonus');
                statusTextEl.textContent = '✨ 奖励时间！双倍得分！✨';
                stopSafeMoodAnim();
                break;
            case 'BITTEN':
                bittenEl.classList.add('show');
                stopSafeMoodAnim();
                break;
        }
    }

    function getDifficultyTimings() {
        const s = Math.floor(score);
        const safeMin    = Math.max(800,  1500 - s * 8);
        const safeMax    = Math.max(1500, 3500 - s * 15);
        const warningMin = Math.max(250,  500  - s * 2);
        const warningMax = Math.max(350,  600  - s * 2);
        const dangerMin  = Math.min(1800, 800  + s * 8);
        const dangerMax  = Math.min(2500, 1800 + s * 10);
        const bonusMin   = Math.max(1500, 3000 - s * 8);
        const bonusMax   = Math.max(2500, 5000 - s * 10);
        return {
            safeDelay:       Math.random() * (safeMax    - safeMin)    + safeMin,
            warningDuration: Math.random() * (warningMax - warningMin) + warningMin,
            dangerDuration:  Math.random() * (dangerMax  - dangerMin)  + dangerMin,
            bonusDuration:   Math.random() * (bonusMax   - bonusMin)   + bonusMin
        };
    }

    function enterDanger(warningDuration, dangerDuration) {
        catState = 'WARNING';
        warningTotalDuration = warningDuration;
        warningDeadline = Date.now() + warningDuration;
        brushedInThisWarning = isBrushing;
        comboAwardedThisWarning = false;
        render();

        clearInterval(warningCheckInterval);
        warningCheckInterval = setInterval(() => {
            if (isGameOver || catState !== 'WARNING') {
                clearInterval(warningCheckInterval);
                warningCheckInterval = null;
                return;
            }
            if (Date.now() >= warningDeadline) {
                clearInterval(warningCheckInterval);
                warningCheckInterval = null;
                triggerDanger(dangerDuration);
            }
        }, 30);
    }

    function triggerDanger(dangerDuration) {
        catState = 'DANGER';
        render();
        playBgm(bgmDanger);

        if (isBrushing) {
            triggerGameOver();
            return;
        }

        clearTimeout(dangerEndTimeout);
        dangerEndTimeout = setTimeout(() => {
            if (catState === 'DANGER' && !isGameOver) {
                catState = 'SAFE';
                render();
                if (isBrushing) playBgm(bgmSafe);
                else            pauseAllBgm();
                startCatAI();
            }
        }, dangerDuration);
    }

    function enterBonus(bonusDuration) {
        catState = 'BONUS';
        render();
        if (isBrushing) playBgm(bgmBonus);
        else            pauseAllBgm();

        clearTimeout(bonusEndTimeout);
        bonusEndTimeout = setTimeout(() => {
            if (catState === 'BONUS' && !isGameOver) {
                catState = 'SAFE';
                render();
                if (isBrushing) playBgm(bgmSafe);
                else            pauseAllBgm();
                startCatAI();
            }
        }, bonusDuration);
    }

    function startCatAI() {
        if (isGameOver) return;
        clearTimeout(stateLogicTimeout);

        const { safeDelay, warningDuration, dangerDuration, bonusDuration } = getDifficultyTimings();

        stateLogicTimeout = setTimeout(() => {
            if (isGameOver) return;
            if (catState === 'SAFE') {
                if (Math.random() < 0.18) enterBonus(bonusDuration);
                else                      enterDanger(warningDuration, dangerDuration);
            } else {
                startCatAI();
            }
        }, safeDelay);
    }

    function startBrushing() {
        if (isGameOver) return;
        if (isBrushing) return;
        isBrushing = true;
        setActorMode(true);

        if (catState === 'WARNING') brushedInThisWarning = true;

        if      (catState === 'BONUS')                         playBgm(bgmBonus);
        else if (catState === 'SAFE' || catState === 'WARNING') playBgm(bgmSafe);

        clearInterval(scoreInterval);
        scoreInterval = setInterval(() => {
            if (catState === 'SAFE') {
                addScore(getBaseScore());
            } else if (catState === 'BONUS') {
                addScore(getBaseScore() * 2);
            } else if (catState === 'WARNING') {
                addScore(getBaseScore() * 1.5);
                warningDeadline -= RISK_PER_TICK;
            } else if (catState === 'DANGER') {
                triggerGameOver();
            }
        }, 100);
    }

    function stopBrushing() {
        if (!isBrushing) return;
        isBrushing = false;
        setActorMode(false);
        clearInterval(scoreInterval);
        scoreInterval = null;
        if (!isGameOver) {
            if (catState === 'WARNING') {
                const timeLeft = warningDeadline - Date.now();
                if (timeLeft <= 0) {
                    triggerGameOver();
                    return;
                }
                if (brushedInThisWarning && !comboAwardedThisWarning) {
                    const isPerfect = timeLeft <= PERFECT_WINDOW_MS;

                    comboAwardedThisWarning = true;
                    combo++;
                    updateComboDisplay(true);

                    if (isPerfect) {
                        addScore(PERFECT_BONUS);
                        showFloatText('好险！ +' + PERFECT_BONUS, '#ff7043');
                        statusTextEl.textContent = '好险！完美收手！ 连击x' + (1 + Math.min(combo, COMBO_MAX) * COMBO_STEP).toFixed(2);
                    } else {
                        showFloatText('安全收手 +' + combo + '连击', '#81c784');
                        statusTextEl.textContent = '安全收手，等待下一轮...';
                    }
                }
            }
            pauseAllBgm();
        }
    }

    function clearAllTimers() {
        clearInterval(scoreInterval);
        clearInterval(warningCheckInterval);
        clearInterval(safeMoodInterval);
        clearTimeout(stateLogicTimeout);
        clearTimeout(warningTimeout);
        clearTimeout(dangerEndTimeout);
        clearTimeout(bonusEndTimeout);
        clearTimeout(floatTextTimeout);
        clearTimeout(comboPopTimeout);
        stopSafeMoodAnim();
        scoreInterval = warningCheckInterval = safeMoodInterval = stateLogicTimeout = warningTimeout = dangerEndTimeout = bonusEndTimeout = floatTextTimeout = comboPopTimeout = null;
    }

    function triggerGameOver() {
        isGameOver = true;
        combo = 0;
        updateComboDisplay(false);
        clearAllTimers();

        let isNewRecord = false;
        const finalScore = Math.floor(score);
        if (finalScore > highScore) {
            highScore = finalScore;
            highScoreValEl.textContent = highScore;
            saveHighScore();
            isNewRecord = true;
        }

        catState = 'BITTEN';
        render();
        setActorMode(false);
        gameoverBtns.style.display = 'flex';
        playBgm(bgmBitten);

        scoreSubmitted = false;

        if (isNewRecord) {
            statusTextEl.textContent = '🎉 新纪录！你被猫猫吃掉了！';
            showSubmitModal(finalScore);
        } else {
            statusTextEl.textContent = '你被猫猫吃掉了！游戏结束。';
        }
    }

    function showSubmitModal(finalScore) {
        modalScoreEl.textContent = finalScore;
        modalNameInput.value = localStorage.getItem('catBrushPlayerName') || '';
        modalResultEl.textContent = '';
        modalResultEl.className = 'modal-result';
        modalSubmitBtn.disabled = false;
        modalSubmitBtn.textContent = '提交分数';
        submitModalEl.classList.add('show');
        setTimeout(() => modalNameInput.focus(), 100);
    }

    function hideSubmitModal() {
        submitModalEl.classList.remove('show');
    }

    async function submitScore() {
        const name = modalNameInput.value.trim();
        if (!name) {
            modalResultEl.textContent = '请输入昵称';
            modalResultEl.className = 'modal-result error';
            return;
        }
        const finalScore = Math.floor(score);
        modalSubmitBtn.disabled = true;
        modalSubmitBtn.textContent = '提交中...';
        modalResultEl.textContent = '';

        try {
            const resp = await fetch(API_BASE + '/api/submit-score', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, score: finalScore })
            });
            const data = await resp.json();
            if (data.ok) {
                localStorage.setItem('catBrushPlayerName', name);
                scoreSubmitted = true;
                if (data.rank) {
                    modalResultEl.textContent = `提交成功！你的排名：第 ${data.rank} 位`;
                } else {
                    modalResultEl.textContent = '提交成功！';
                }
                modalSubmitBtn.textContent = '已提交';
                setTimeout(() => hideSubmitModal(), 1200);
                fetchLeaderboard();
            } else {
                modalResultEl.textContent = '提交失败，请重试';
                modalResultEl.className = 'modal-result error';
                modalSubmitBtn.disabled = false;
                modalSubmitBtn.textContent = '提交分数';
            }
        } catch (e) {
            modalResultEl.textContent = '网络错误，请重试';
            modalResultEl.className = 'modal-result error';
            modalSubmitBtn.disabled = false;
            modalSubmitBtn.textContent = '提交分数';
        }
    }

    async function fetchLeaderboard(myScore) {
        try {
            const url = API_BASE + '/api/leaderboard' + (typeof myScore === 'number' ? `?score=${myScore}` : '');
            const resp = await fetch(url, { cache: 'no-store' });
            const data = await resp.json();
            renderLeaderboard(data);
        } catch (e) {
            rankModalContent.innerHTML = '<div class="lb-empty">排行榜加载失败，请检查网络</div>';
        }
    }

    function openRankModal() {
        rankModalContent.innerHTML = '<div class="lb-loading">加载中...</div>';
        rankModalEl.classList.add('show');
        fetchLeaderboard();
    }

    function closeRankModal() {
        rankModalEl.classList.remove('show');
    }

    function renderLeaderboard(data) {
        if (!data || !data.ok) {
            rankModalContent.innerHTML = '<div class="lb-empty">暂无数据</div>';
            return;
        }
        const top = data.top || [];
        let html = '<div class="leaderboard-list">';
        if (top.length === 0) {
            html += '<div class="lb-empty">暂无记录，来做第一个吧！</div>';
        } else {
            top.forEach((item, i) => {
                const rankClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
                const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i + 1);
                const safeName = (item.player_name || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
                html += `<div class="lb-row"><span class="lb-rank ${rankClass}">${medal}</span><span class="lb-name">${safeName}</span><span class="lb-score">${item.score}</span></div>`;
            });
        }
        html += '</div>';
        if (data.myRank) {
            html += `<div class="lb-my-rank"><span>你的排名</span><span>第 ${data.myRank} 位 / 共 ${data.totalPlayers} 人</span></div>`;
        } else if (data.totalPlayers) {
            html += `<div class="lb-my-rank"><span>总玩家</span><span>${data.totalPlayers} 人</span></div>`;
        }
        rankModalContent.innerHTML = html;
    }

    function startGame() {
        hideSubmitModal();
        clearAllTimers();
        score = 0;
        combo = 0;
        isGameOver = false;
        isBrushing = false;
        catState = 'SAFE';
        brushedInThisWarning = false;
        comboAwardedThisWarning = false;
        scoreSubmitted = false;

        scoreValEl.textContent = '0';
        updateComboDisplay(false);
        gameoverBtns.style.display = 'none';
        setActorMode(false);
        floatTextEl.classList.remove('show');

        stopAllBgm();
        showPage(gamePage);
        render();
        startCatAI();
    }

    function goHome() {
        hideSubmitModal();
        closeRankModal();
        isGameOver = true;
        clearAllTimers();
        stopAllBgm();
        setActorMode(false);
        gameoverBtns.style.display = 'none';
        if (highScore > 0) startHighScore.textContent = '最高分：' + highScore;
        showPage(startPage);
    }

    /* ========== 事件绑定 ========== */
    document.addEventListener('click',     unlockAudio);
    document.addEventListener('touchstart', unlockAudio, { passive: true });

    ctrlBtnEl.addEventListener('mousedown',  (e) => { e.preventDefault(); startBrushing(); });
    window.addEventListener('mouseup',       stopBrushing);
    ctrlBtnEl.addEventListener('touchstart', (e) => { e.preventDefault(); startBrushing(); }, { passive: false });
    window.addEventListener('touchend',      stopBrushing);
    window.addEventListener('touchcancel',   stopBrushing);

    restartBtn.addEventListener('click', startGame);
    homeBtn.addEventListener('click',    goHome);
    startBtn.addEventListener('click',   startGame);

    modalSubmitBtn.addEventListener('click', submitScore);
    modalSkipBtn.addEventListener('click',   hideSubmitModal);
    modalNameInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') submitScore();
    });
    submitModalEl.addEventListener('click', (e) => {
        if (e.target === submitModalEl) hideSubmitModal();
    });

    rankBtn.addEventListener('click', openRankModal);
    rankCloseBtn.addEventListener('click', closeRankModal);
    rankModalEl.addEventListener('click', (e) => {
        if (e.target === rankModalEl) closeRankModal();
    });

    /* ========== 启动流程 ========== */
    loadHighScore();
    setActorMode(false);

    preloadAllImages(() => {
        setTimeout(() => {
            showPage(startPage);
        }, 300);
    });
</script>

</body>
</html>
