<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>给猫猫刷毛毛</title>
    <link rel="icon" type="image/x-icon" href="image/favicon.ico">
    <style>
        /* ========== 启动界面 ========== */
        #start-screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(160deg, #f7ebd3 0%, #f5e1c0 50%, #efd6ae 100%);
            z-index: 100;
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        #start-screen.hidden {
            opacity: 0;
            transform: scale(1.08);
            pointer-events: none;
        }
        #start-screen .start-cat {
            font-size: 120px;
            line-height: 1;
            margin-bottom: 10px;
            animation: catBounce 3s ease-in-out infinite;
            filter: drop-shadow(0 8px 20px rgba(109, 76, 65, 0.15));
        }
        @keyframes catBounce {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            20% { transform: translateY(-12px) rotate(-3deg); }
            40% { transform: translateY(0) rotate(0deg); }
            60% { transform: translateY(-6px) rotate(2deg); }
            80% { transform: translateY(0) rotate(0deg); }
        }
        #start-screen .start-title {
            font-size: 42px;
            font-weight: 800;
            color: #5d4037;
            letter-spacing: 4px;
            margin: 8px 0 6px 0;
            text-shadow: 0 2px 4px rgba(255, 255, 255, 0.6);
        }
        #start-screen .start-subtitle {
            font-size: 16px;
            color: #8d6e63;
            margin: 0 0 28px 0;
            opacity: 0.8;
        }
        #start-btn {
            padding: 14px 48px;
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, #a1887f, #8d6e63);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(141, 110, 99, 0.35);
            transition: transform 0.15s, box-shadow 0.15s;
            letter-spacing: 2px;
        }
        #start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(141, 110, 99, 0.45);
        }
        #start-btn:active {
            transform: scale(0.96);
            box-shadow: 0 3px 10px rgba(141, 110, 99, 0.25);
        }
        @keyframes startFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        #start-screen .start-cat,
        #start-screen .start-title,
        #start-screen .start-subtitle,
        #start-btn {
            opacity: 0;
            animation: startFadeIn 0.7s ease forwards;
        }
        #start-screen .start-title { animation-delay: 0.15s; }
        #start-screen .start-subtitle { animation-delay: 0.3s; }
       #start-btn { animation-delay: 0.45s; }

        /* ========== 加载界面 ========== */
        #loading-screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(160deg, #f7ebd3 0%, #f5e1c0 50%, #efd6ae 100%);
            z-index: 200;
            transition: opacity 0.5s ease;
        }
        #loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #loading-bar-track {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(141, 110, 99, 0.15);
            z-index: 201;
            overflow: hidden;
        }
        #loading-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #a1887f, #8d6e63, #6d4c41);
            border-radius: 0 3px 3px 0;
            transition: width 0.3s ease;
        }
        #loading-text {
            font-size: 24px;
            font-weight: 600;
            color: #8d6e63;
            letter-spacing: 3px;
            opacity: 0;
        }
        #loading-text.animate {
            animation: loadingTextAnim 2.2s ease forwards;
        }
        @keyframes loadingTextAnim {
            0%   { opacity: 0; transform: translateY(10px); }
            12%  { opacity: 1; transform: translateY(0); }
            65%  { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-10px); }
        }

        /* game wrapper fade-in */
        #game-wrapper {
            opacity: 0;
            transition: opacity 0.6s ease;
        }
        #game-wrapper.visible {
            opacity: 1;
        }


        body {
            margin: 0;
            background-color: #f7ebd3;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            touch-action: manipulation;
        }
        #game-container {
            text-align: center;
            position: relative;
        }
        #score-area {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
        }
        .score-box {
            text-align: center;
        }
        .score-label {
            font-size: 14px;
            color: #8d6e63;
            margin-bottom: 4px;
        }
        #score, #high-score {
            font-size: 28px;
            font-weight: bold;
            color: #6d4c41;
        }
        #high-score {
            color: #a1887f;
        }
        #cat {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            background-color: #ffb74d;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            transition: transform 0.1s, background-color 0.2s;
            cursor: pointer;
        }
        #cat.brushing {
            transform: scale(1.05) rotate(2deg);
        }
        @keyframes bonusGlow {
            0%, 100% { box-shadow: 0 8px 16px rgba(0,0,0,0.1), 0 0 20px rgba(129, 199, 132, 0.4); }
            50% { box-shadow: 0 8px 16px rgba(0,0,0,0.1), 0 0 40px rgba(129, 199, 132, 0.8); }
        }
        #cat.bonus {
            animation: bonusGlow 0.8s ease-in-out infinite;
        }
        #status-text {
            margin-top: 20px;
            font-size: 20px;
            color: #5d4037;
            height: 30px;
        }
        #restart-btn {
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 16px;
            background-color: #8d6e63;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            display: none;
        }
        #restart-btn:active {
            background-color: #6d4c41;
        }
        #home-btn {
            margin-top: 15px;
            margin-left: 10px;
            padding: 10px 20px;
            font-size: 16px;
            background-color: #a1887f;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            display: none;
        }
        #home-btn:active {
            background-color: #8d6e63;
        }
    </style>
</head>
<body>

<!-- ========== 加载界面 ========== -->
<div id="loading-screen">
    <div id="loading-bar-track"><div id="loading-bar-fill"></div></div>
    <div id="loading-text">Made by 木鸡先生Hen<br>
        Idea by artbyeori<br>
    打开一半音量游玩，体验更佳</div>

</div>

<!-- ===== 启动界面 ===== -->
 <div id="start-screen" class="hidden">
    <div class="start-cat">🐱</div>
    <div class="start-title">给猫猫刷毛毛</div>
    <div class="start-subtitle">长按给猫猫梳毛，小心别惹它生气！</div>
    <button id="start-btn">开始</button>
</div>

<!-- ===== 游戏 ===== -->
<div id="game-wrapper">
<div id="game-container">
    <div id="score-area">
        <div class="score-box">
            <div class="score-label">得分</div>
            <div id="score"><span id="score-val">0</span></div>
        </div>
        <div class="score-box">
            <div class="score-label">最高分</div>
            <div id="high-score"><span id="high-score-val">0</span></div>
        </div>
    </div>
    <div id="cat">🐱</div>
    <div id="status-text">长按给猫刷毛！</div>
    <button id="restart-btn">重新挑战</button>
    <button id="home-btn">返回首页</button>
</div>
</div>

<script>
    const bgmSafe = new Audio('bgm/safe.mp3');
    const bgmDanger = new Audio('bgm/danger.mp3');
    const bgmBitten = new Audio('bgm/bitten.mp3');
    const bgmBonus = new Audio('bgm/bonus.mp3');
    bgmSafe.loop = true;
    bgmDanger.loop = true;
    bgmBitten.loop = false;
    bgmBonus.loop = true;
    const bgmStart = new Audio('bgm/start.mp3');
    bgmStart.loop = false;

    // 预加载所有音频，全部就绪后再显示启动页
    const allAudios = [bgmSafe, bgmDanger, bgmBitten, bgmBonus, bgmStart];
    var loadStartTime = Date.now();
    let loadedCount = 0;
    allAudios.forEach(function(audio) {
        audio.preload = 'auto';
        audio.addEventListener('canplaythrough', function() {
            if (this._ready) return;
            this._ready = true;
            loadedCount++;
            loadingBarFill.style.width = (loadedCount / allAudios.length * 100) + '%';
            if (loadedCount === allAudios.length) {
                // 所有音频就绪，确保文本淡出动画至少完成后再显示启动页
                var elapsed = Date.now() - loadStartTime;
                var delay = Math.max(0, 2200 - elapsed);
                setTimeout(showStartScreen, delay);
            }
        });
        audio.addEventListener('error', function() {
            if (this._ready) return;
            this._ready = true;
            loadedCount++;
            loadingBarFill.style.width = (loadedCount / allAudios.length * 100) + '%';
            if (loadedCount === allAudios.length) {
                showStartScreen();
            }
        });
    });
    // 安全兜底：最多等 10 秒
    setTimeout(showStartScreen, 10000);

    // 首次用户交互时解锁音频上下文
    let audioUnlocked = false;
    function unlockAudioOnce() {
        if (audioUnlocked) return;
        audioUnlocked = true;
        document.removeEventListener('pointerdown', unlockAudioOnce);
        document.removeEventListener('touchstart', unlockAudioOnce);
        // 用 AudioContext 解锁音频，同时播放下 start.ogg
        try {
            var _ctx = new (window.AudioContext || window.webkitAudioContext)();
            _ctx.resume().then(function(){
                _ctx.close();
            });
        } catch(e) {}
        bgmStart.currentTime = 0;
        bgmStart.play().catch(function(){});
    }
    document.addEventListener('pointerdown', unlockAudioOnce, { once: true });
    document.addEventListener('touchstart', unlockAudioOnce, { once: true });

    let currentBgm = null;

    function playBgm(audio) {
        if (currentBgm && currentBgm !== audio) {
            currentBgm.pause();
            if (currentBgm === bgmBitten) {
                currentBgm.currentTime = 0;
            }
        }
        if (audio && audio !== currentBgm) {
            if (audio === bgmBitten) {
                audio.currentTime = 0;
            }
            audio.play().catch(() => {});
        }
        currentBgm = audio;
    }

    function pauseAllBgm() {
        [bgmSafe, bgmDanger, bgmBitten, bgmBonus].forEach(audio => {
            audio.pause();
        });
        currentBgm = null;
    }

    function stopAllBgm() {
        [bgmSafe, bgmDanger, bgmBitten, bgmBonus].forEach(audio => {
            audio.pause();
            audio.currentTime = 0;
        });
        currentBgm = null;
    }

    let score = 0;
    let highScore = 0;
    let isGameOver = false;
    let isBrushing = false;
    let catState = 'SAFE';
    let warningStartTime = 0;
    let warningDuration = 0;
    let dangerDuration = 0;
    let dangerEdgeCount = 0;
    let safeStreak = 0;
    
    const catEl = document.getElementById('cat');
    const scoreValEl = document.getElementById('score-val');
    const highScoreValEl = document.getElementById('high-score-val');
    const statusTextEl = document.getElementById('status-text');
    const restartBtn = document.getElementById('restart-btn');
    const homeBtn = document.getElementById('home-btn');

    const EMOJIS = {
        SAFE: '🐱',
        WARNING: '😼',
        DANGER: '😾',
        BONUS: '😸',
        BITTEN: '🐯'
    };

    let stateLogicTimeout = null;
    let warningTimeout = null;
    let dangerEndTimeout = null;
    let bonusEndTimeout = null;
    let scoreInterval = null;

    function loadHighScore() {
        highScoreValEl.textContent = highScore;
        try {
            const saved = localStorage.getItem('catBrushHighScore');
            if (saved !== null) {
                highScore = parseInt(saved, 10) || 0;
                highScoreValEl.textContent = highScore;
            }
        } catch(e) {}
    }

    function saveHighScore() {
        try {
            localStorage.setItem('catBrushHighScore', String(highScore));
        } catch(e) {}
    }

    function getDifficultyTimings() {
        const safeMin = Math.max(800, 1500 - score * 8);
        const safeMax = Math.max(1500, 3500 - score * 15);
        const warningMin = Math.max(250, 500 - score * 2);
        const warningMax = Math.max(350, 600 - score * 2);
        const dangerMin = Math.min(1800, 800 + score * 8);
        const dangerMax = Math.min(2500, 1800 + score * 10);
        const bonusMin = Math.max(1500, 3000 - score * 8);
        const bonusMax = Math.max(2500, 5000 - score * 10);
        return {
            safeDelay: Math.random() * (safeMax - safeMin) + safeMin,
            warningDuration: Math.random() * (warningMax - warningMin) + warningMin,
            dangerDuration: Math.random() * (dangerMax - dangerMin) + dangerMin,
            bonusDuration: Math.random() * (bonusMax - bonusMin) + bonusMin
        };
    }
    function enterDanger(w, d) {
        catState = 'WARNING';
        catEl.textContent = EMOJIS.WARNING;
        catEl.style.backgroundColor = '#ffd54f';
        catEl.classList.remove('bonus');
        statusTextEl.textContent = '!!猫猫要回头了！';
        warningStartTime = Date.now();
        warningDuration = w;
        dangerDuration = d;
        dangerEdgeCount = 0;
        clearTimeout(warningTimeout);
        warningTimeout = setTimeout(() => {
            if (catState === 'WARNING' && !isGameOver) {
                triggerDangerState();
            }
        }, w);
    }

    function triggerDangerState() {
        if (catState !== 'WARNING' || isGameOver) return;

        // if brushing when caught, go straight to game over
        if (isBrushing) {
            catState = 'DANGER';
            triggerGameOver();
            return;
        }

        catState = 'DANGER';
        catEl.textContent = EMOJIS.DANGER;
        catEl.style.backgroundColor = '#e57373';
        statusTextEl.textContent = '别动！！！猫猫生气了！';
        playBgm(bgmDanger);
        clearTimeout(dangerEndTimeout);
        dangerEndTimeout = setTimeout(() => {
            if (catState === 'DANGER' && !isGameOver) {
                catState = 'SAFE';
                catEl.textContent = EMOJIS.SAFE;
                catEl.style.backgroundColor = '#ffb74d';
                catEl.classList.remove('bonus');
                statusTextEl.textContent = '安全，继续刷毛...';
                if (isBrushing) {
                    playBgm(bgmSafe);
                } else {
                    pauseAllBgm();
                }
                safeStreak = 0;
                startCatAI();
            }
        }, dangerDuration);
    }

    function enterBonus(bonusDuration) {
        catState = 'BONUS';
        catEl.textContent = EMOJIS.BONUS;
        catEl.style.backgroundColor = '#81c784';
        catEl.classList.add('bonus');
        statusTextEl.textContent = '✨ 奖励时间！双倍得分！✨';
        if (isBrushing) {
            playBgm(bgmBonus);
        } else {
            pauseAllBgm();
        }

        clearTimeout(bonusEndTimeout);
        bonusEndTimeout = setTimeout(() => {
            if (catState === 'BONUS' && !isGameOver) {
                catState = 'SAFE';
                catEl.textContent = EMOJIS.SAFE;
                catEl.style.backgroundColor = '#ffb74d';
                catEl.classList.remove('bonus');
                statusTextEl.textContent = '安全，继续刷毛...';
                if (isBrushing) {
                    playBgm(bgmSafe);
                } else {
                    pauseAllBgm();
                }
                startCatAI();
            }
        }, bonusDuration);
    }

    function startCatAI() {
        if (isGameOver) return;
        clearTimeout(stateLogicTimeout);
        
        const { safeDelay, warningDuration, dangerDuration, bonusDuration } = getDifficultyTimings();
        
        stateLogicTimeout = setTimeout(() => {
            if (isGameOver) return;

            if (catState === 'SAFE') {
                if (Math.random() < 0.18) {
                    enterBonus(bonusDuration);
                } else {
                    enterDanger(warningDuration, dangerDuration);
                }
            } else {
                startCatAI();
            }
        }, safeDelay);
    }

    function startBrushing() {
        if (isGameOver) return;
        if (isBrushing) return;
        isBrushing = true;
        catEl.classList.add('brushing');

        if (catState === 'BONUS') {
            playBgm(bgmBonus);
        } else if (catState === 'SAFE') {
            playBgm(bgmSafe);
        }

        clearInterval(scoreInterval);
        scoreInterval = setInterval(() => {
            if (catState === 'SAFE') {
                let streakBonus = Math.min(safeStreak * 0.1, 1.0);
                score += 1 + streakBonus;
                                scoreValEl.textContent = Math.floor(score);

                if (safeStreak > 0 && Math.floor(score) % 20 == 0) {
                    statusTextEl.textContent = '连击 x' + (safeStreak + 1);
                }
            } else if (catState === 'BONUS') {
                let streakBonus = Math.min(safeStreak * 0.2, 2.0);
                score += 2 + streakBonus;
                                scoreValEl.textContent = Math.floor(score);

            } else if (catState === 'WARNING' && isBrushing) {
                let streakBonus = Math.min(safeStreak * 0.1, 1.0);
                score += 1.5 + streakBonus;
                                scoreValEl.textContent = Math.floor(score);

                dangerEdgeCount++;
                let elapsed = Date.now() - warningStartTime;
                let effectiveElapsed = elapsed + (dangerEdgeCount * 50);
                if (effectiveElapsed >= warningDuration && catState === 'WARNING') {
                    clearTimeout(warningTimeout);
                    triggerDangerState();
                }
            } else if (catState === 'DANGER') {
                triggerGameOver();
            }
        }, 100);
    }

    function stopBrushing() {
        if (!isBrushing) return;
        isBrushing = false;
        catEl.classList.remove('brushing');
        clearInterval(scoreInterval);
        scoreInterval = null;

        if (catState === 'WARNING' && !isGameOver) {
            clearTimeout(warningTimeout);
            let elapsed = Date.now() - warningStartTime;
            let effectiveElapsed = elapsed + (dangerEdgeCount * 50);
            let remaining = warningDuration - effectiveElapsed;
            let threshold = warningDuration * 0.25;

            if (remaining > 0 && remaining < threshold) {
                let bonusScore = Math.max(5, Math.floor((threshold - remaining) / 100) * 5 + 10);
                score += bonusScore;
                                scoreValEl.textContent = Math.floor(score);

                statusTextEl.textContent = '好险！完美收手！+' + bonusScore;
                safeStreak++;
            } else {
                safeStreak = 0;
                statusTextEl.textContent = '安全，继续刷毛...';
            }

            catState = 'SAFE';
            catEl.textContent = EMOJIS.SAFE;
            catEl.style.backgroundColor = '#ffb74d';
            catEl.classList.remove('bonus');
            pauseAllBgm();
            startCatAI();
            return;
        }

        if (!isGameOver) {
            pauseAllBgm();
        }
    }

    function triggerGameOver() {
        if (isGameOver) return;
        isGameOver = true;
        clearInterval(scoreInterval);
        scoreInterval = null;
        clearTimeout(stateLogicTimeout);
        clearTimeout(warningTimeout);
        clearTimeout(dangerEndTimeout);
        clearTimeout(bonusEndTimeout);

        let isNewRecord = false;
        if (score > highScore) {
            highScore = Math.floor(score);

            highScoreValEl.textContent = highScore;
            saveHighScore();
            isNewRecord = true;
        }

        safeStreak = 0;
        catState = 'BITTEN';
        catEl.textContent = EMOJIS.BITTEN;
        catEl.style.backgroundColor = '#b71c1c';
        catEl.classList.remove('bonus');
        statusTextEl.textContent = isNewRecord ? '新纪录！你被猫猫吃掉了！' : '你被猫猫吃掉了！游戏结束。';
        restartBtn.style.display = 'inline-block';
        homeBtn.style.display = 'inline-block';
        playBgm(bgmBitten);
    }

    function resetGame() {
        score = 0;
        isGameOver = false;
        isBrushing = false;
        catState = 'SAFE';
        safeStreak = 0;
        dangerEdgeCount = 0;

        scoreValEl.textContent = score;
        catEl.textContent = EMOJIS.SAFE;
        catEl.style.backgroundColor = '#ffb74d';
        catEl.classList.remove('bonus');
        statusTextEl.textContent = '长按给猫刷毛！';
        restartBtn.style.display = 'none';
        homeBtn.style.display = 'none';

        stopAllBgm();
        startCatAI();
    }

    loadHighScore();

    catEl.addEventListener('mousedown', (e) => { e.preventDefault(); startBrushing(); });
    window.addEventListener('mouseup', stopBrushing);

    catEl.addEventListener('touchstart', (e) => { e.preventDefault(); startBrushing(); }, { passive: false });
    window.addEventListener('touchend', stopBrushing);
    window.addEventListener('touchcancel', stopBrushing);

    restartBtn.addEventListener('click', resetGame);

    function goToHome() {
        // 先清除猫AI定时器，防止 resetGame → startCatAI 的定时器在首页触发剧毒/奖励音效
        clearTimeout(stateLogicTimeout);
        stopAllBgm();
        resetGame();
        clearTimeout(stateLogicTimeout);
        stopAllBgm();
        gameWrapper.classList.remove('visible');
        startScreen.classList.remove('hidden');
        hasStarted = false;
        homeBtn.style.display = 'none';
        bgmStart.currentTime = 0;
        bgmStart.play().catch(() => {});
    }

    homeBtn.addEventListener('click', goToHome);

    /* ===== 启动界面逻辑 ===== */
    const loadingScreen = document.getElementById("loading-screen");
    const loadingBarFill = document.getElementById("loading-bar-fill");
    const loadingText = document.getElementById("loading-text");
    const startScreen = document.getElementById("start-screen");
    const startBtn = document.getElementById("start-btn");
    const gameWrapper = document.getElementById("game-wrapper");
    let hasStarted = false;
    let isLoading = true;

    /* 加载动画 → 启动界面 */
    function showStartScreen() {
        if (!isLoading) return;
        isLoading = false;
        loadingScreen.classList.add("hidden");
        startScreen.classList.remove("hidden");
        // 触发启动界面的淡入动画
        // 页面首次交互时已由 unlockAudioOnce 触发播放，此处不再重复尝试
    }

    /* 加载开始：条形进度条 + 文本淡入淡出 */
    loadingText.classList.add("animate");

    function startGame() {
        if (hasStarted) return;
        hasStarted = true;
        // 播放开场音效，延迟片刻再进入游戏
        clearTimeout(stateLogicTimeout);
        stopAllBgm();
        bgmStart.currentTime = 0;
        bgmStart.play().catch(function(){});
        setTimeout(function() {
            bgmStart.pause();
            bgmStart.currentTime = 0;
            startScreen.classList.add("hidden");
            gameWrapper.classList.add("visible");
            startCatAI();
        }, 1800);
    }

    startBtn.addEventListener("click", startGame);
    startBtn.addEventListener("touchend", function(e) {
        e.preventDefault();
        startGame();
    });

</script>
